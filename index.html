<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Modern</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="calculator">
        <form name="calcForm" onsubmit="event.preventDefault()">
          <!-- Ecranul calculatorului format din istoric și afișajul principal -->
          <div class="display-container">
            <div id="history" class="history-display"></div>
            <input type="text" id="calcDisplay" placeholder="0" readonly />
          </div>

          <!-- Rândul 1 de butoane -->
          <div class="row">
            <button type="button" class="btn operator" data-action="clear">AC</button>
            <button type="button" class="btn operator" data-action="delete">DE</button>
            <button type="button" class="btn operator" data-action="append" data-value=".">.</button>
            <button type="button" class="btn operator" data-action="append" data-value="/">÷</button>
          </div>

          <!-- Rândul 2 de butoane -->
          <div class="row">
            <button type="button" class="btn" data-action="number">7</button>
            <button type="button" class="btn" data-action="number">8</button>
            <button type="button" class="btn" data-action="number">9</button>
            <button type="button" class="btn operator" data-action="append" data-value="*">×</button>
          </div>

          <!-- Rândul 3 de butoane -->
          <div class="row">
            <button type="button" class="btn" data-action="number">4</button>
            <button type="button" class="btn" data-action="number">5</button>
            <button type="button" class="btn" data-action="number">6</button>
            <button type="button" class="btn operator" data-action="append" data-value="-">-</button>
          </div>

          <!-- Rândul 4 de butoane -->
          <div class="row">
            <button type="button" class="btn" data-action="number">1</button>
            <button type="button" class="btn" data-action="number">2</button>
            <button type="button" class="btn" data-action="number">3</button>
            <button type="button" class="btn operator" data-action="append" data-value="+">+</button>
          </div>

          <!-- Rândul 5 de butoane -->
          <div class="row">
            <button type="button" class="btn" data-action="number">00</button>
            <button type="button" class="btn" data-action="number">0</button>
            <button type="button" class="btn equal" data-action="calculate">=</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Conectăm fișierul JavaScript extern la finalul body-ului -->
    <script src="script.js"></script>
  </body>
</html>
